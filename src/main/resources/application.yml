spring:
  application:
    name: Enterprice level todo
    # Database connection settings
  datasource:
      url: ${DATABASE_URL}
      username: ${DATABASE_USER}
      password: ${DATABASE_PWD}
      driver-class-name: org.postgresql.Driver

      hikari:
        maximum-pool-size: 20
        minimum-idle: 5
      # JPA configuration 
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        # liquibase migration stuff
  liquibase:
    enabled: false
    change-log: classpath:db/changelog/db.changelog-master.yaml
jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 900000     # should be 10-15 minutes
  refresh-token-expiration: 604800000  # should be 1-30 days 
  issuer: todo-app
google:
  client-id: ${GOOGLE_CLIENT_ID}
  client-secret: ${GOOGLE_SECRET}
  redirect-uri: ${REDIRECT_URI}

 # Logging level config
